version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "gomod"
    directory: "/agent"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      # glib is pinned by Tauri/wry's current GTK/WebKitGTK stack. Dependabot
      # cannot update it independently to the patched 0.20.x line until the
      # upstream stack moves off gtk-rs 0.18.
      - dependency-name: "glib"
