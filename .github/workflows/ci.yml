name: Desktop CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_AUDIT_VERSION: "0.22.1"
  GOVULNCHECK_VERSION: "v1.3.0"

concurrency:
  group: desktop-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm audit --audit-level=moderate

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev policykit-1

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: cargo fmt --check
        working-directory: src-tauri

      - name: Build agent resource for Tauri checks
        run: bash scripts/build-agent.sh linux-amd64

      - run: npm run verify:tauri-resources

      - run: cargo clippy --no-deps -- -D warnings
        working-directory: src-tauri

      - name: Install cargo-audit
        run: bash scripts/install-security-tools.sh cargo-audit

      - run: bash scripts/cargo-audit.sh

      - run: cargo test
        working-directory: src-tauri

  agent:
    name: Go Agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Check gofmt
        run: test -z "$(gofmt -l .)"

      - run: go vet ./...

      - name: Install govulncheck
        run: bash ../scripts/install-security-tools.sh govulncheck

      - run: bash ../scripts/govulncheck.sh

      - run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: agent-coverage
          path: agent/coverage.out
          retention-days: 14
