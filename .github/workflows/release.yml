name: Desktop Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_AUDIT_VERSION: "0.22.1"
  GOVULNCHECK_VERSION: "v1.3.0"

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev policykit-1

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm ci
      - run: npm run check
      - run: npm audit --audit-level=moderate

      - run: cargo fmt --check
        working-directory: src-tauri

      - name: Build agent resource for Tauri checks
        run: bash scripts/build-agent.sh linux-amd64

      - run: npm run verify:tauri-resources

      - run: cargo clippy --no-deps -- -D warnings
        working-directory: src-tauri

      - name: Install cargo-audit
        run: bash scripts/install-security-tools.sh cargo-audit

      - run: bash scripts/cargo-audit.sh

      - run: cargo test
        working-directory: src-tauri

      - name: Check gofmt
        run: test -z "$(gofmt -l .)"
        working-directory: agent

      - run: go vet ./...
        working-directory: agent

      - name: Install govulncheck
        run: bash scripts/install-security-tools.sh govulncheck

      - run: bash scripts/govulncheck.sh

      - run: go test -race ./...
        working-directory: agent

  package:
    name: Package
    needs: quality-gate
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x86_64
            runner: ubuntu-22.04
            os: linux
            rust-target: x86_64-unknown-linux-gnu
            agent-target: linux-amd64
            asset-platform: linux
            asset-arch: x64

          - label: macOS Apple Silicon
            runner: macos-15
            os: macos
            rust-target: aarch64-apple-darwin
            agent-target: darwin-arm64
            asset-platform: macos
            asset-arch: arm64

          - label: macOS Intel
            runner: macos-15-intel
            os: macos
            rust-target: x86_64-apple-darwin
            agent-target: darwin-amd64
            asset-platform: macos
            asset-arch: x64

          - label: Windows x86_64
            runner: windows-2025
            os: windows
            rust-target: x86_64-pc-windows-msvc
            agent-target: windows-amd64
            asset-platform: windows
            asset-arch: x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev policykit-1 \
            rpm

      - run: npm ci

      - name: Build target agent
        shell: bash
        run: bash scripts/build-agent.sh ${{ matrix.agent-target }}

      - name: Verify Tauri resources
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows" ]; then
            npm run verify:tauri-resources -- src-tauri/tauri.conf.json src-tauri/tauri.windows.conf.json
          else
            npm run verify:tauri-resources
          fi

      - name: Make agent executable
        if: matrix.os != 'windows'
        run: chmod +x agent/target/release/agent*

      - name: Import macOS signing certificate
        if: matrix.os == 'macos' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Build Tauri packages
        id: build_tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tauriScript: npm run tauri --
          tagName: ${{ github.ref_name }}
          releaseName: MidoriVPN Desktop ${{ github.ref_name }}
          releaseBody: |
            ## MidoriVPN Desktop ${{ github.ref_name }}

            Draft release generated by CI. Verify installers, checksums, and SBOM before publishing.
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          releaseAssetNamePattern: MidoriVPN-${{ matrix.asset-platform }}-${{ matrix.asset-arch }}-[version][ext]
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: MidoriVPN-${{ matrix.asset-platform }}-${{ matrix.asset-arch }}-[bundle]

      - name: Record package status
        if: ${{ always() }}
        shell: bash
        run: |
          mkdir -p package-status
          status="failed"
          if [ "${{ steps.build_tauri.outcome }}" = "success" ]; then
            status="success"
          fi

          jq -n \
            --arg label "${{ matrix.label }}" \
            --arg platform "${{ matrix.asset-platform }}" \
            --arg arch "${{ matrix.asset-arch }}" \
            --arg status "$status" \
            '{label: $label, platform: $platform, arch: $arch, status: $status}' \
            > "package-status/${{ matrix.asset-platform }}-${{ matrix.asset-arch }}.json"

      - name: Upload package status
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: package-status-${{ matrix.asset-platform }}-${{ matrix.asset-arch }}
          path: package-status/${{ matrix.asset-platform }}-${{ matrix.asset-arch }}.json
          retention-days: 30

  release-status:
    name: Update Draft Release Metadata
    needs: package
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      has-successful-packages: ${{ steps.summarize.outputs.has-successful-packages }}
    steps:
      - name: Download package status metadata
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: package-status-*
          path: package-status
          merge-multiple: true

      - name: Build release summary
        id: summarize
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          IN_PROGRESS_MESSAGE: in progress
        run: |
          shopt -s nullglob
          files=(package-status/*.json)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "has-successful-packages=false" >> "$GITHUB_OUTPUT"
            cat > release-body.md <<EOF
          ## MidoriVPN Desktop ${RELEASE_TAG}

          Draft release generated by CI. Verify installers, checksums, and SBOM before publishing.

          ### Package Status
          - No packages could be confirmed in this workflow run.
          EOF
            exit 0
          fi

          jq -s '
            {
              successful: map(select(.status == "success")) | sort_by(.label),
              failed: map(select(.status != "success")) | sort_by(.label)
            }
          ' "${files[@]}" > package-summary.json

          if [ "$(jq '.successful | length' package-summary.json)" -gt 0 ]; then
            echo "has-successful-packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-successful-packages=false" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "## MidoriVPN Desktop ${RELEASE_TAG}"
            echo
            echo "Draft release generated by CI. Verify installers, checksums, and SBOM before publishing."
            echo

            if [ "$(jq '.successful | length' package-summary.json)" -gt 0 ]; then
              echo "### Available Packages"
              jq -r '.successful[] | "- \(.label)"' package-summary.json
              echo
            fi

            if [ "$(jq '.failed | length' package-summary.json)" -gt 0 ]; then
              echo "### Packages In Progress"
              jq -r --arg msg "$IN_PROGRESS_MESSAGE" '.failed[] | "- \(.label) (\($msg))"' package-summary.json
              echo
              echo "_The release is published with available packages while these platforms finish building._"
            fi
          } > release-body.md

      - name: Update draft release body
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          body_path: release-body.md

  checksums:
    name: Generate Checksums
    needs: release-status
    if: ${{ needs.release-status.outputs.has-successful-packages == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: MidoriVPN-*
          path: release-artifacts
          merge-multiple: true

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          cd release-artifacts
          mapfile -d '' artifacts < <(find . -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \
            -o -name "*.dmg" -o -name "*.msi" -o -name "*.exe" \
            -o -name "*.tar.gz" -o -name "*.zip" \) -print0 | sort -z)
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No release installer artifacts were found" >&2
            exit 1
          fi
          printf '%s\0' "${artifacts[@]}" | xargs -0 sha256sum > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload checksums to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: release-artifacts/SHA256SUMS.txt
          fail_on_unmatched_files: true

      - name: Upload checksums as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SHA256SUMS
          path: release-artifacts/SHA256SUMS.txt
          retention-days: 90

  sign:
    name: Sign Checksums
    needs: sbom
    runs-on: ubuntu-latest
    if: ${{ vars.GPG_SIGN_ENABLED == 'true' }}
    permissions:
      contents: write
    steps:
      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: SHA256SUMS
          path: .

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent

      - name: Sign SHA256SUMS
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --detach-sign --armor SHA256SUMS.txt

      - name: Upload signature to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: SHA256SUMS.txt.asc
          fail_on_unmatched_files: true

  sbom:
    name: Generate SBOM
    needs: checksums
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: MidoriVPN-*
          path: release-artifacts
          merge-multiple: true

      - name: Install Syft
        id: syft
        uses: anchore/sbom-action/download-syft@v0.24.0

      - name: Generate source SBOM
        run: |
          "${{ steps.syft.outputs.cmd }}" dir:. \
            --output cyclonedx-json=midorivpn-desktop-sbom.cdx.json \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'src-tauri/target' \
            --exclude 'agent/target'

      - name: Generate artifact SBOM
        run: |
          "${{ steps.syft.outputs.cmd }}" dir:release-artifacts \
            --output cyclonedx-json=midorivpn-desktop-artifacts-sbom.cdx.json

      - name: Upload SBOMs to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            midorivpn-desktop-sbom.cdx.json
            midorivpn-desktop-artifacts-sbom.cdx.json
          fail_on_unmatched_files: true

      - name: Upload SBOMs as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            midorivpn-desktop-sbom.cdx.json
            midorivpn-desktop-artifacts-sbom.cdx.json
          retention-days: 180
