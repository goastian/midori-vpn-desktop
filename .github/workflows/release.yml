# MidoriVPN Desktop release pipeline.
#
# Triggered on push of any tag matching `v*`. Creates a draft GitHub Release
# during assembly, uploads one bundle per supported platform plus checksums,
# SBOMs, and (optionally) GPG-signed checksums, then publishes automatically
# after release asset validation passes.
#
# Fault-isolation policy
# ----------------------
# * Each platform builds in its own matrix entry with `fail-fast: false`.
# * The `Build Tauri packages` step is allowed to fail without aborting the
#   matrix entry: subsequent steps run with `if: always()` so we always emit a
#   `package-status-*` artifact reporting `success` or `failure` per platform.
# * The `release-status` job aggregates those statuses and rewrites the draft
#   release body listing available and unavailable platforms.
# * Downstream jobs (`checksums`, `sbom`, `sign`, `publish-release`) only run
#   when at least one platform succeeded (`has-successful-packages == 'true'`),
#   so a single failing platform never blocks publishing the others.
#
# Required GitHub configuration
# -----------------------------
# Repository (or organization) variables:
#   APPLE_SIGNING_ENABLED   set to "true" to import the Apple signing cert
#   GPG_SIGN_ENABLED        set to "true" to GPG-sign SHA256SUMS.txt
#
# Repository (or organization) secrets:
#   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, KEYCHAIN_PASSWORD
#   APPLE_ID, APPLE_ID_PASSWORD, APPLE_TEAM_ID                 (notarization)
#   TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD (updater)
#   GPG_PRIVATE_KEY, GPG_PASSPHRASE                            (checksum sig)
#
# Re-running a single failed platform
# -----------------------------------
# Use the GitHub Actions UI: "Re-run failed jobs" on this workflow. Successful
# matrix entries are not rebuilt; only the failed one re-executes and uploads
# its asset to the existing draft release before final validation publishes it.

name: Desktop Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_AUDIT_VERSION: "0.22.1"
  GOVULNCHECK_VERSION: "v1.3.0"
  # Note on Rust toolchain: we intentionally track `stable` here instead of a
  # hard pin because cargo-audit 0.22.x requires Rust >= 1.85 and the
  # `Cargo.lock` resolved deps frequently depend on the current stable. If
  # you need reproducibility, add a `rust-toolchain.toml` in `src-tauri/`
  # rather than pinning the action ref - dtolnay/rust-toolchain will honor
  # the toolchain file automatically.

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Quality gates - split into three parallel jobs for faster feedback. All
  # three must pass before any platform is packaged.
  # ---------------------------------------------------------------------------
  frontend-gate:
    name: Quality Gate - Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run check
      - run: npm audit --audit-level=moderate

  rust-gate:
    name: Quality Gate - Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev policykit-1

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm ci

      - run: cargo fmt --check
        working-directory: src-tauri

      - name: Build agent resource for Tauri checks
        run: bash scripts/build-agent.sh linux-amd64

      - run: npm run verify:tauri-resources

      - run: cargo clippy --no-deps -- -D warnings
        working-directory: src-tauri

      - name: Install cargo-audit
        run: bash scripts/install-security-tools.sh cargo-audit

      - run: bash scripts/cargo-audit.sh

      - run: cargo test
        working-directory: src-tauri

  agent-gate:
    name: Quality Gate - Go Agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Check gofmt
        run: test -z "$(gofmt -l .)"

      - run: go vet ./...

      - name: Install govulncheck
        run: bash ../scripts/install-security-tools.sh govulncheck

      - run: bash ../scripts/govulncheck.sh

      - run: go test -race ./...

  package:
    name: Package - ${{ matrix.label }}
    needs: [frontend-gate, rust-gate, agent-gate]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    # fail-fast: false ensures one platform failing does not cancel the others.
    # Combined with `if: always()` on status/upload steps below, this guarantees
    # every platform is reported and successful bundles are still published.
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x86_64
            runner: ubuntu-22.04
            os: linux
            rust-target: x86_64-unknown-linux-gnu
            agent-target: linux-amd64
            asset-platform: linux
            asset-arch: x86_64
            asset-id: linux-x86_64

          - label: Linux arm64
            runner: ubuntu-22.04-arm
            os: linux
            rust-target: aarch64-unknown-linux-gnu
            agent-target: linux-arm64
            asset-platform: linux
            asset-arch: arm64
            asset-id: linux-arm64

          - label: macOS Apple Silicon
            runner: macos-15
            os: macos
            rust-target: aarch64-apple-darwin
            agent-target: darwin-arm64
            asset-platform: macos
            asset-arch: arm64
            asset-id: macos-arm64

          - label: macOS Intel
            runner: macos-15-intel
            os: macos
            rust-target: x86_64-apple-darwin
            agent-target: darwin-amd64
            asset-platform: macos
            asset-arch: x86_64
            asset-id: macos-x86_64

          - label: Windows x86_64
            runner: windows-2025
            os: windows
            rust-target: x86_64-pc-windows-msvc
            agent-target: windows-amd64
            asset-platform: windows
            asset-arch: x86_64
            asset-id: windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev policykit-1 \
            rpm

      - run: npm ci

      - name: Build target agent
        shell: bash
        run: bash scripts/build-agent.sh ${{ matrix.agent-target }}

      - name: Ensure Windows agent alias
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $exe = "agent/target/release/agent.exe"
          $alias = "agent/target/release/agent"

          if (!(Test-Path $exe)) {
            throw "Missing expected Windows agent binary: $exe"
          }

          Copy-Item -Force $exe $alias
          Write-Host "Created Windows agent alias: $alias"

      - name: Inspect built agent artifacts
        shell: bash
        run: |
          echo "Contents of agent/target/release after build:"
          ls -la agent/target/release || true

      - name: Verify Tauri resources
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows" ]; then
            npm run verify:tauri-resources -- src-tauri/tauri.conf.json src-tauri/tauri.windows.conf.json
          else
            npm run verify:tauri-resources
          fi

      - name: Make agent executable
        if: matrix.os != 'windows'
        shell: bash
        run: chmod +x agent/target/release/agent*

      # Import the Apple signing certificate only when explicitly enabled via
      # the `APPLE_SIGNING_ENABLED` repository/organization variable. We cannot
      # gate this step on `secrets.*` directly because secrets are not exposed
      # to `if:` conditions. Setting the variable to `true` is the supported
      # opt-in once the required secrets are configured.
      - name: Import macOS signing certificate
        if: matrix.os == 'macos' && vars.APPLE_SIGNING_ENABLED == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      # tauri-action is pinned to a minor release line to avoid a flaky
      # release run if upstream ships a breaking change. Bump deliberately.
      - name: Read release notes from changelog
        id: release_notes
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: bash scripts/extract-release-notes.sh "$RELEASE_TAG" CHANGELOG.md release-body.md

      - name: Build Tauri packages
        id: build_tauri
        continue-on-error: true
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tauriScript: npm run tauri --
          tagName: ${{ github.ref_name }}
          releaseName: ${{ steps.release_notes.outputs.release-title }}
          releaseBody: ${{ steps.release_notes.outputs.release-body }}
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          releaseAssetNamePattern: MidoriVPN-Desktop-[version]-${{ matrix.asset-id }}[ext]
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: MidoriVPN-Desktop-[version]-${{ matrix.asset-id }}-[bundle]

      - name: Record package status
        if: ${{ always() }}
        shell: bash
        run: |
          mkdir -p package-status
          status='${{ steps.build_tauri.outcome }}'

          # `label` is a reserved keyword in jq >= 1.7 (label-break feature).
          # Using it as both --arg name and inside the filter causes a parse
          # error even with quoted keys. We use `name` instead.
          jq -n \
            --arg name "${{ matrix.label }}" \
            --arg platform "${{ matrix.asset-platform }}" \
            --arg arch "${{ matrix.asset-arch }}" \
            --arg asset_id "${{ matrix.asset-id }}" \
            --arg status "$status" \
            '{"name": $name, "platform": $platform, "arch": $arch, "asset_id": $asset_id, "status": $status}' \
            > "package-status/${{ matrix.asset-platform }}-${{ matrix.asset-arch }}.json"

      - name: Summarize platform result
        if: ${{ always() }}
        shell: bash
        run: |
          status='${{ steps.build_tauri.outcome }}'
          {
            echo "## ${{ matrix.label }} (${{ matrix.asset-platform }}/${{ matrix.asset-arch }})"
            echo
            echo "- Runner: \`${{ matrix.runner }}\`"
            echo "- Rust target: \`${{ matrix.rust-target }}\`"
            echo "- Agent target: \`${{ matrix.agent-target }}\`"
            echo "- Release asset id: \`${{ matrix.asset-id }}\`"
            echo "- Tauri build outcome: **${status}**"
            if [ "$status" != "success" ]; then
              echo
              echo "Tauri packaging failed. See the \`Build Tauri packages\` step log above for details. Other platforms continue independently."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload package status
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: package-status-${{ matrix.asset-platform }}-${{ matrix.asset-arch }}
          path: package-status/${{ matrix.asset-platform }}-${{ matrix.asset-arch }}.json
          retention-days: 30

  release-status:
    name: Update Draft Release Metadata
    needs: package
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      has-successful-packages: ${{ steps.summarize.outputs.has-successful-packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download package status metadata
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: package-status-*
          path: package-status
          merge-multiple: true

      - name: Read release notes from changelog
        id: release_notes
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: bash scripts/extract-release-notes.sh "$RELEASE_TAG" CHANGELOG.md changelog-body.md

      - name: Build release summary
        id: summarize
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_TITLE: ${{ steps.release_notes.outputs.release-title }}
        run: |
          shopt -s nullglob
          files=(package-status/*.json)
          has_successful_packages=false

          if [ "${#files[@]}" -eq 0 ]; then
            echo "has-successful-packages=${has_successful_packages}" >> "$GITHUB_OUTPUT"
            {
              echo "## ${RELEASE_TITLE}"
              cat changelog-body.md
              echo
              echo "### Package Status"
              echo "- No package status artifacts were found for this workflow run."
            } > release-body.md
            exit 0
          fi

          jq -s '
            {
              successful: map(select(.status == "success")) | sort_by(.name),
              failed: map(select(.status != "success")) | sort_by(.name)
            }
          ' "${files[@]}" > package-summary.json

          if [ "$(jq '.successful | length' package-summary.json)" -gt 0 ]; then
            has_successful_packages=true
          fi

          echo "has-successful-packages=${has_successful_packages}" >> "$GITHUB_OUTPUT"

          {
            echo "## ${RELEASE_TITLE}"
            cat changelog-body.md
            echo

            if [ "$(jq '.successful | length' package-summary.json)" -gt 0 ]; then
              echo "### Available Packages"
              jq -r '.successful[] | "- \(.name) (`\(.asset_id)`)"' package-summary.json
              echo
            fi

            if [ "$(jq '.failed | length' package-summary.json)" -gt 0 ]; then
              echo "### Packages Unavailable"
              jq -r '.failed[] | "- \(.name) (`\(.asset_id)`, unavailable)"' package-summary.json
              echo
              echo "_Some platform builds were not included in this draft release._"
            fi
          } > release-body.md

      - name: Update draft release body
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.release_notes.outputs.release-title }}
          draft: true
          body_path: release-body.md

  checksums:
    name: Generate Checksums
    needs: release-status
    if: ${{ needs.release-status.outputs.has-successful-packages == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Fallback - Download installers from draft release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          mkdir -p release-artifacts
          mapfile -d '' found_installers < <(find release-artifacts -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \
            -o -name "*.dmg" -o -name "*.msi" -o -name "*.exe" \
            -o -name "*.tar.gz" -o -name "*.zip" \) -print0)

          if [ "${#found_installers[@]}" -gt 0 ]; then
            echo "Installer artifacts already available from workflow artifacts."
            exit 0
          fi

          echo "No installer workflow artifacts found; downloading release assets for tag ${RELEASE_TAG}."
          gh release download "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --dir release-artifacts \
            --pattern "*.deb" \
            --pattern "*.rpm" \
            --pattern "*.AppImage" \
            --pattern "*.dmg" \
            --pattern "*.msi" \
            --pattern "*.exe" \
            --pattern "*.tar.gz" \
            --pattern "*.zip"

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          mkdir -p release-artifacts
          cd release-artifacts

          echo "Downloaded artifacts tree:"
          find . -maxdepth 3 -type f | sort || true

          mapfile -d '' artifacts < <(find . -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \
            -o -name "*.dmg" -o -name "*.msi" -o -name "*.exe" \
            -o -name "*.tar.gz" -o -name "*.zip" \) -print0 | sort -z)
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No release installer artifacts were found after download-artifact." >&2
            echo "Check that tauri-action uploaded release assets or workflow artifacts." >&2
            exit 1
          fi
          printf '%s\0' "${artifacts[@]}" | xargs -0 sha256sum > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload checksums as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: SHA256SUMS
          path: release-artifacts/SHA256SUMS.txt
          retention-days: 90

      - name: Add checksums to draft release body
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release view "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --json body \
            --jq '.body' \
            > release-body.md

          awk '
            /^### SHA-256 Checksums$/ { exit }
            { print }
          ' release-body.md > release-body-with-checksums.md

          {
            echo
            echo "### SHA-256 Checksums"
            echo
            echo '```text'
            cat release-artifacts/SHA256SUMS.txt
            echo '```'
          } >> release-body-with-checksums.md

          gh release edit "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --notes-file release-body-with-checksums.md

  sign:
    name: Sign Checksums
    needs: [release-status, sbom]
    runs-on: ubuntu-latest
    if: ${{ vars.GPG_SIGN_ENABLED == 'true' && needs.release-status.outputs.has-successful-packages == 'true' }}
    permissions:
      contents: write
    steps:
      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: SHA256SUMS
          path: .

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent

      - name: Sign SHA256SUMS
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --detach-sign --armor SHA256SUMS.txt

      - name: Upload signature as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: SHA256SUMS-signature
          path: SHA256SUMS.txt.asc
          retention-days: 90

  sbom:
    name: Generate SBOM
    needs: [release-status, checksums]
    if: ${{ needs.release-status.outputs.has-successful-packages == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Fallback - Download installers from draft release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          mkdir -p release-artifacts
          mapfile -d '' found_installers < <(find release-artifacts -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \
            -o -name "*.dmg" -o -name "*.msi" -o -name "*.exe" \
            -o -name "*.tar.gz" -o -name "*.zip" \) -print0)

          if [ "${#found_installers[@]}" -gt 0 ]; then
            echo "Installer artifacts already available from workflow artifacts."
            exit 0
          fi

          echo "No installer workflow artifacts found; downloading release assets for tag ${RELEASE_TAG}."
          gh release download "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --dir release-artifacts \
            --pattern "*.deb" \
            --pattern "*.rpm" \
            --pattern "*.AppImage" \
            --pattern "*.dmg" \
            --pattern "*.msi" \
            --pattern "*.exe" \
            --pattern "*.tar.gz" \
            --pattern "*.zip"

      - name: Install Syft
        id: syft
        uses: anchore/sbom-action/download-syft@v0.24.0

      - name: Generate source SBOM
        run: |
          "${{ steps.syft.outputs.cmd }}" dir:. \
            --output cyclonedx-json=midorivpn-desktop-sbom.cdx.json \
            --exclude './.git' \
            --exclude './node_modules' \
            --exclude './src-tauri/target' \
            --exclude './agent/target'

      - name: Generate artifact SBOM
        run: |
          "${{ steps.syft.outputs.cmd }}" dir:release-artifacts \
            --output cyclonedx-json=midorivpn-desktop-artifacts-sbom.cdx.json

      - name: Upload SBOMs as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: |
            midorivpn-desktop-sbom.cdx.json
            midorivpn-desktop-artifacts-sbom.cdx.json
          retention-days: 180

  publish-release:
    name: Publish Release
    needs: [release-status, checksums, sbom, sign]
    if: >-
      ${{
        always() &&
        needs.release-status.outputs.has-successful-packages == 'true' &&
        needs.checksums.result == 'success' &&
        needs.sbom.result == 'success' &&
        (needs.sign.result == 'success' || needs.sign.result == 'skipped')
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate draft release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release view "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --json isDraft,isPrerelease,assets \
            > release.json

          is_draft="$(jq -r '.isDraft' release.json)"
          if [ "$is_draft" != "true" ]; then
            echo "Release ${RELEASE_TAG} is not a draft; refusing to publish an unexpected release state." >&2
            exit 1
          fi

          installer_count="$(jq '
            [.assets[].name | select(test("\\.(deb|rpm|AppImage|dmg|msi|exe|tar\\.gz|zip)$"))]
            | length
          ' release.json)"
          if [ "$installer_count" -eq 0 ]; then
            echo "Release ${RELEASE_TAG} has no installer assets." >&2
            exit 1
          fi

      - name: Publish draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          publish_args=(--draft=false)

          if [[ "$RELEASE_TAG" == *"-rc"* || "$RELEASE_TAG" == *"-beta"* || "$RELEASE_TAG" == *"-alpha"* ]]; then
            publish_args+=(--prerelease --latest=false)
          else
            publish_args+=(--latest)
          fi

          gh release edit "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            "${publish_args[@]}"
